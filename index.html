<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --primary: #1e3a8a;
        --bg: #f1f5f9;
        --card-bg: #ffffff;
        --text: #334155;
      }
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header h1 {
        color: var(--primary);
        margin-bottom: 5px;
        font-size: 2.5rem;
      }
      /* Current Info Cards Layout */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        text-align: center;
        border-top: 4px solid var(--primary);
      }
      .stat-card h3 {
        margin: 0 0 10px 0;
        font-size: 1rem;
        color: #64748b;
        text-transform: uppercase;
      }
      .stat-card .value {
        font-size: 1.8rem;
        font-weight: bold;
        color: #0f172a;
      }
      /* Separate Charts Layout */
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
        gap: 25px;
      }
      @media (max-width: 500px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
      }
      .chart-card {
        background: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
      .chart-card h3 {
        margin-top: 0;
        color: var(--primary);
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 10px;
      }
      .chart-container {
        position: relative;
        height: 300px;
        width: 100%;
      }
      .loading {
        text-align: center;
        font-size: 1.5rem;
        color: #64748b;
        padding: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>KUALA LUMPUR Weather Dashboard</h1>
        <p>Visual Analysis of Real-Time Weather Data & 7-Day Forecast</p>
      </header>

      <div id="loader" class="loading">Fetching latest weather data...</div>

      <div id="dashboard" style="display: none">
        <div class="stats-grid">
          <div class="stat-card" style="border-top-color: #ef4444">
            <h3>Current Temperature</h3>
            <div class="value" id="current-temp">-</div>
          </div>
          <div class="stat-card" style="border-top-color: #3b82f6">
            <h3>Current Humidity</h3>
            <div class="value" id="current-humidity">-</div>
          </div>
          <div class="stat-card" style="border-top-color: #10b981">
            <h3>Wind Speed</h3>
            <div class="value" id="current-wind">-</div>
          </div>
          <div class="stat-card" style="border-top-color: #f59e0b">
            <h3>Timezone</h3>
            <div class="value" id="location-zone">-</div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            <h3>Maximum Temperature Forecast (°C)</h3>
            <div class="chart-container">
              <canvas id="tempChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <h3>Maximum Humidity Trend (%)</h3>
            <div class="chart-container">
              <canvas id="humidityChart"></canvas>
            </div>
          </div>

          <div class="chart-card" style="grid-column: span 1">
            <h3>Maximum Wind Speed Forecast (km/h)</h3>
            <div class="chart-container">
              <canvas id="windChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Kuala Lumpur Coordinates
      const LATITUDE = 3.139;
      const LONGITUDE = 101.6869;

      const API_URL = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true&daily=temperature_2m_max,relative_humidity_2m_max,windspeed_10m_max&timezone=Asia%2FKuala_Lumpur`;

      let tempChartInstance = null;
      let humidityChartInstance = null;
      let windChartInstance = null;

      async function fetchWeatherData() {
        try {
          const response = await fetch(API_URL);
          const data = await response.json();

          document.getElementById('loader').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';

          document.getElementById('current-temp').innerText =
            `${data.current_weather.temperature} °C`;
          document.getElementById('current-wind').innerText =
            `${data.current_weather.windspeed} km/h`;
          document.getElementById('location-zone').innerText =
            data.timezone_abbreviation;
          document.getElementById('current-humidity').innerText =
            `${data.daily.relative_humidity_2m_max[0]} %`;

          buildTemperatureChart(data.daily.time, data.daily.temperature_2m_max);
          buildHumidityChart(
            data.daily.time,
            data.daily.relative_humidity_2m_max,
          );
          buildWindChart(data.daily.time, data.daily.windspeed_10m_max);
        } catch (error) {
          console.error('Technical issue:', error);
          if (document.getElementById('dashboard').style.display === 'none') {
            document.getElementById('loader').innerText =
              'Failed to load the dashboard view.';
          }
        }
      }

      // Chart 1 Function: Temperature (Updated to Line Chart with custom Point Styling)
      function buildTemperatureChart(labels, tempData) {
        const ctx = document.getElementById('tempChart').getContext('2d');
        
        if (tempChartInstance) {
          tempChartInstance.data.labels = labels;
          tempChartInstance.data.datasets[0].data = tempData;
          tempChartInstance.update();
        } else {
          tempChartInstance = new Chart(ctx, {
            type: 'line', // Ditukar kepada line
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Max Temp (°C)',
                  data: tempData,
                  borderColor: '#ff6384', // Warna garisan merah jambu/merah lembut berkilat
                  backgroundColor: 'rgba(255, 99, 132, 0.2)',
                  borderWidth: 3,
                  tension: 0.1, // Kelukan garisan sedikit beralun
                  pointStyle: 'circle', // Bentuk titik bulat seperti dalam gambar rujukan
                  pointRadius: 10, // Besarkan saiz titik bulatan (radius)
                  pointHoverRadius: 14, // Saiz titik apabila tetikus berada di atasnya
                  pointBackgroundColor: '#ff6384',
                  pointBorderColor: 'rgba(255, 99, 132, 0.4)',
                  pointBorderWidth: 5
                },
              ],
            },
            options: { responsive: true, maintainAspectRatio: false },
          });
        }
      }

      function buildHumidityChart(labels, humidityData) {
        const ctx = document.getElementById('humidityChart').getContext('2d');
        
        if (humidityChartInstance) {
          humidityChartInstance.data.labels = labels;
          humidityChartInstance.data.datasets[0].data = humidityData;
          humidityChartInstance.update();
        } else {
          humidityChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Humidity (%)',
                  data: humidityData,
                  borderColor: '#3b82f6',
                  backgroundColor: 'rgba(59, 130, 246, 0.1)',
                  fill: true,
                  tension: 0.4,
                  borderWidth: 3,
                },
              ],
            },
            options: { responsive: true, maintainAspectRatio: false },
          });
        }
      }

      function buildWindChart(labels, windData) {
        const ctx = document.getElementById('windChart').getContext('2d');
        
        if (windChartInstance) {
          windChartInstance.data.labels = labels;
          windChartInstance.data.datasets[0].data = windData;
          windChartInstance.update();
        } else {
          windChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Max Wind Speed (km/h)',
                  data: windData,
                  borderColor: '#10b981',
                  backgroundColor: 'transparent',
                  borderWidth: 3,
                  tension: 0,
                  pointStyle: 'rectRot',
                  pointRadius: 6,
                },
              ],
            },
            options: { responsive: true, maintainAspectRatio: false },
          });
        }
      }

      fetchWeatherData();

      setInterval(() => {
        console.log('Fetching fresh live weather data...');
        fetchWeatherData();
      }, 300000);
    </script>
  </body>
</html>
